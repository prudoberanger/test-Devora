<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se connecter — Devora</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <a href="index.html" class="auth-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#FF5500"/>
      <path d="M8 8h5.5a6.5 6.5 0 0 1 0 13H8V8z" fill="white"/>
      <circle cx="18.5" cy="19.5" r="2.5" fill="white"/>
    </svg>
    <span>Devora</span>
  </a>

  <div class="auth-card glass">
    <h1 class="auth-title">Bon retour !</h1>
    <p class="auth-subtitle">Connecte-toi pour continuer ton apprentissage.</p>

    <div id="alert-login"></div>

    <div class="oauth-buttons">
      <button class="btn btn-outline btn-full" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuer avec Google
      </button>
      <div class="divider"><span>ou</span></div>
    </div>

    <div class="form-fields">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="ton@email.fr" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">
          Mot de passe
          <a href="reset-password.html" class="forgot-link">Mot de passe oublié ?</a>
        </label>
        <input class="form-input" type="password" id="password" placeholder="Ton mot de passe" required>
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="btn-login" onclick="login()">Se connecter</button>

    <p class="auth-footer">Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    redirectIfAuth()

    async function signInWithGoogle() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      })
      if (error) showAlert(error.message)
    }

    async function login() {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('btn-login')
      const alertEl  = document.getElementById('alert-login')

      if (!email || !password) {
        alertEl.innerHTML = '<div class="alert alert-error" style="margin-bottom:16px">Remplis tous les champs.</div>'
        return
      }

      btn.textContent = 'Connexion...'
      btn.disabled = true
      alertEl.innerHTML = ''

      const { error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        btn.textContent = 'Se connecter'
        btn.disabled = false
        const msg = error.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : error.message
        alertEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:16px">${msg}</div>`
        return
      }

      window.location.href = 'dashboard.html'
    }

    // Connexion avec Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login()
    })
  </script>
</body>
</html>
