<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Se connecter — Devora</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--orange:#FF5500;--orange-h:#E64D00;--orange-l:#FFF0EB;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;--black:#0A0A0A;--r8:8px;--r12:12px;--r16:16px;--tr:all .22s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--g50);color:var(--g800);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:Arial,Helvetica,sans-serif;cursor:pointer;border:none;outline:none}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;font-size:1.2rem;font-weight:800;color:var(--black)}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6);box-shadow:0 8px 32px rgba(255,85,0,.09);border-radius:var(--r16);padding:40px 36px}
.tit{font-size:1.7rem;font-weight:800;color:var(--black);letter-spacing:-.02em;margin-bottom:8px}
.sub{font-size:.93rem;color:var(--g600);margin-bottom:28px;line-height:1.5}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;font-size:1rem;font-weight:700;border-radius:var(--r8);transition:var(--tr);cursor:pointer;white-space:nowrap;font-family:Arial,Helvetica,sans-serif;width:100%}
.bp{background:var(--orange);color:#fff;border:none;margin-top:4px}.bp:hover{background:var(--orange-h)}
.bp:disabled{opacity:.6;cursor:not-allowed}
.gg{background:#fff;color:var(--g800);border:1.5px solid var(--g200)}.gg:hover{border-color:var(--orange);color:var(--orange)}
.fields{display:flex;flex-direction:column;gap:16px;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:6px}
.lbl{font-size:.9rem;font-weight:600;color:var(--g800);display:flex;justify-content:space-between;align-items:center}
.fl{font-size:.82rem;color:var(--orange);font-weight:600}
.inp{padding:13px 16px;font-size:1rem;font-family:Arial,Helvetica,sans-serif;border:1.5px solid var(--g200);border-radius:var(--r8);background:#fff;color:var(--g800);transition:var(--tr);outline:none;width:100%}
.inp:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,85,0,.12)}
.inp::placeholder{color:var(--g400)}
.alert{padding:12px 16px;border-radius:var(--r8);font-size:.88rem;font-weight:500;margin-bottom:16px}
.ae{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.divider{display:flex;align-items:center;gap:12px;color:var(--g400);font-size:.85rem;margin:8px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--g200)}
.foot{text-align:center;font-size:.88rem;color:var(--g600);margin-top:20px}
.foot a{color:var(--orange);font-weight:700}
@media(max-width:480px){.card{padding:28px 20px}}
</style>
</head>
<body>

<a href="index.html" class="logo">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#FF5500"/><path d="M8 8h5.5a6.5 6.5 0 0 1 0 13H8V8z" fill="white"/><circle cx="18.5" cy="19.5" r="2.5" fill="white"/></svg>
  Devora
</a>

<div class="card">
  <h1 class="tit">Bon retour !</h1>
  <p class="sub">Connecte-toi pour continuer ton apprentissage.</p>
  <div id="alert"></div>

  <button class="btn gg" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continuer avec Google
  </button>

  <div class="divider"><span>ou</span></div>

  <div class="fields">
    <div class="fg">
      <label class="lbl">Adresse email</label>
      <input class="inp" type="email" id="email" placeholder="ton@email.fr">
    </div>
    <div class="fg">
      <label class="lbl">
        Mot de passe
        <a href="#" class="fl">Mot de passe oublié ?</a>
      </label>
      <input class="inp" type="password" id="pwd" placeholder="Ton mot de passe">
    </div>
  </div>

  <button class="btn bp" id="btn" onclick="login()">Se connecter</button>
  <p class="foot">Pas encore de compte ? <a href="inscription.html">S'inscrire gratuitement</a></p>
</div>

<script>
const { createClient } = supabase
const db = createClient(
  'https://vwkvumlgtwqatiixxleh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3a3Z1bWxndHdxYXRpaXh4bGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTY3MjcsImV4cCI6MjA5MDYzMjcyN30.Ux3WkEsAbliTdd0FrORduUVFWgIKqjtZBjzJQpRSQeE'
)

// Rediriger si déjà connecté
db.auth.getUser().then(({ data }) => { if (data.user) location.href = 'dashboard.html' })

async function loginGoogle() {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + '/dashboard.html' }
  })
  if (error) showAlert(error.message)
}

async function login() {
  const email = document.getElementById('email').value.trim()
  const pwd   = document.getElementById('pwd').value
  const btn   = document.getElementById('btn')
  const al    = document.getElementById('alert')

  if (!email || !pwd) { al.innerHTML = '<div class="alert ae">Remplis tous les champs.</div>'; return }

  btn.textContent = 'Connexion...'
  btn.disabled = true
  al.innerHTML = ''

  const { error } = await db.auth.signInWithPassword({ email, password: pwd })

  if (error) {
    btn.textContent = 'Se connecter'
    btn.disabled = false
    const msg = error.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : error.message
    al.innerHTML = `<div class="alert ae">${msg}</div>`
    return
  }

  location.href = 'dashboard.html'
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login() })
</script>
</body>
</html>
